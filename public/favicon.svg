<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Vignette -->
    <radialGradient id="bg_grad" cx="256" cy="256" r="256" gradientUnits="userSpaceOnUse">
      <stop offset="0.6" stop-color="#0c0a09"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    
    <!-- Vinyl Shell Shimmer -->
    <radialGradient id="vinyl_depth" cx="256" cy="256" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0.75" stop-color="#14110f"/>
      <stop offset="0.92" stop-color="#0c0a09"/>
      <stop offset="1" stop-color="#292524"/>
    </radialGradient>

    <!-- Chrome Rim Reflection -->
    <linearGradient id="rim_shine" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#57534e"/>
      <stop offset="0.5" stop-color="#fafaf9"/>
      <stop offset="1" stop-color="#292524"/>
    </linearGradient>

    <!-- Anisotropic Shine (The Dynamic "V" reflection on vinyl) -->
    <conicGradient id="aniso_shine" cx="256" cy="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="black" stop-opacity="0"/>
      <stop offset="0.22" stop-color="white" stop-opacity="0.1"/>
      <stop offset="0.25" stop-color="white" stop-opacity="0.2"/>
      <stop offset="0.28" stop-color="white" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="black" stop-opacity="0"/>
      <stop offset="0.72" stop-color="white" stop-opacity="0.15"/>
      <stop offset="0.75" stop-color="white" stop-opacity="0.25"/>
      <stop offset="0.78" stop-color="white" stop-opacity="0.15"/>
      <stop offset="1" stop-color="black" stop-opacity="0"/>
    </conicGradient>

    <!-- Glowing Core Pulse -->
    <radialGradient id="core_energy" cx="256" cy="256" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.4" stop-color="#f97316" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Professional Hub Metallic -->
    <linearGradient id="hub_metal" x1="216" y1="216" x2="296" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8bc"/>
      <stop offset="0.4" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <!-- Layers -->
  <circle cx="256" cy="256" r="256" fill="url(#bg_grad)"/>
  
  <!-- Outer Rim -->
  <circle cx="256" cy="256" r="248" stroke="url(#rim_shine)" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Vinyl Main Body -->
  <circle cx="256" cy="256" r="242" fill="url(#vinyl_depth)"/>
  
  <!-- Concentric Grooves (High Precision) -->
  <g opacity="0.2" stroke="white" stroke-width="0.2">
    <circle cx="256" cy="256" r="225"/><circle cx="256" cy="256" r="220"/><circle cx="256" cy="256" r="215"/>
    <circle cx="256" cy="256" r="210"/><circle cx="256" cy="256" r="205"/><circle cx="256" cy="256" r="200"/>
    <circle cx="256" cy="256" r="195"/><circle cx="256" cy="256" r="190"/><circle cx="256" cy="256" r="185"/>
    <circle cx="256" cy="256" r="180"/><circle cx="256" cy="256" r="175"/><circle cx="256" cy="256" r="170"/>
    <circle cx="256" cy="256" r="165"/><circle cx="256" cy="256" r="160"/><circle cx="256" cy="256" r="155"/>
  </g>

  <!-- The "Shine" -->
  <circle cx="256" cy="256" r="242" fill="url(#aniso_shine)"/>

  <!-- Center Hub Recess -->
  <circle cx="256" cy="256" r="95" fill="black" opacity="0.3"/>
  
  <!-- Glowing Interactive Interface -->
  <circle cx="256" cy="256" r="85" fill="url(#core_energy)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Central Gold Spindle -->
  <circle cx="256" cy="256" r="42" fill="url(#hub_metal)" stroke="#451a03" stroke-width="0.5"/>
  
  <!-- High Intensity Core Highlight -->
  <circle cx="256" cy="256" r="12" fill="white" opacity="0.9">
     <animate attributeName="r" values="11;13;11" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>